name: Publish Release

on:
    push:
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish or retry, for example v0.0.12
                required: true
                type: string

permissions:
    contents: write
    packages: write

env:
    IMAGE_NAME: ghcr.io/oullin/go-fmt
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

concurrency:
    group: publish-release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify release tag and checkout tagged commit
              run: |
                  set -euo pipefail

                  case "${RELEASE_TAG}" in
                      v*) ;;
                      *)
                          printf 'release tag must start with v, got %s\n' "${RELEASE_TAG}" >&2
                          exit 1
                          ;;
                  esac

                  git fetch --force --tags origin "refs/tags/${RELEASE_TAG}:refs/tags/${RELEASE_TAG}"
                  git checkout --detach "refs/tags/${RELEASE_TAG}"

                  tag_sha="$(git rev-list -n1 "refs/tags/${RELEASE_TAG}")"
                  head_sha="$(git rev-parse HEAD)"

                  if [ "${tag_sha}" != "${head_sha}" ]; then
                      printf 'refusing to publish release artifacts: checked out %s but tag %s points to %s\n' "${head_sha}" "${RELEASE_TAG}" "${tag_sha}" >&2
                      exit 1
                  fi
              shell: bash

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=${{ env.RELEASE_TAG }}

            - name: Build and push release image
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      VERSION=${{ env.RELEASE_TAG }}

            - name: Verify published release image
              env:
                  NEW_TAG: ${{ env.RELEASE_TAG }}
              run: ./scripts/verify-release-image.sh
              shell: bash

            - name: Promote verified release image to latest
              env:
                  DIGEST: ${{ steps.build.outputs.digest }}
              run: |
                  set -euo pipefail

                  docker buildx imagetools create \
                      --tag "${IMAGE_NAME}:latest" \
                      "${IMAGE_NAME}@${DIGEST}"
              shell: bash

            - name: Create or update release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  prerelease: false
                  generate_release_notes: true
                  body: |
                      Docker image published to `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}`.
                      `${{ env.IMAGE_NAME }}:latest` now aliases the verified `${{ env.RELEASE_TAG }}` digest.
