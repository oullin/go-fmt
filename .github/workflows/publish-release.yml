name: Publish Release

# Release publishing is invoked explicitly from Release Tag; tag pushes are not
# a supported publish trigger path in this repository.
on:
    workflow_call:
        inputs:
            tag:
                description: Release tag to publish, for example v0.0.12
                required: true
                type: string
    workflow_dispatch:
        inputs:
            tag:
                description: Existing release tag to publish or retry, for example v0.0.12
                required: true
                type: string

permissions:
    contents: write
    packages: write

env:
    IMAGE_NAME: ghcr.io/oullin/go-fmt
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'
    RELEASE_TAG: ${{ inputs.tag }}

concurrency:
    group: publish-release-${{ inputs.tag }}
    cancel-in-progress: false

jobs:
    publish:
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify release tag and checkout tagged commit
              run: ./scripts/verify-release-tag.sh
              shell: bash

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=${{ env.RELEASE_TAG }}

            - name: Build and push release image
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      VERSION=${{ env.RELEASE_TAG }}

            - name: Verify published release image
              env:
                  NEW_TAG: ${{ env.RELEASE_TAG }}
              run: ./scripts/verify-release-image.sh
              shell: bash

            - name: Promote verified release image to latest
              env:
                  DIGEST: ${{ steps.build.outputs.digest }}
              run: |
                  set -euo pipefail

                  docker buildx imagetools create \
                      --tag "${IMAGE_NAME}:latest" \
                      "${IMAGE_NAME}@${DIGEST}"
              shell: bash

            - name: Create or update release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ env.RELEASE_TAG }}
                  prerelease: false
                  generate_release_notes: true
                  body: |
                      Docker image published to `${{ env.IMAGE_NAME }}:${{ env.RELEASE_TAG }}`.
                      `${{ env.IMAGE_NAME }}:latest` now aliases the verified `${{ env.RELEASE_TAG }}` digest.
