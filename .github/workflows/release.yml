name: Release

on:
    push:
        branches:
            - main

permissions:
    contents: write
    packages: write

env:
    IMAGE_NAME: ghcr.io/oullin/go-fmt
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - semantic
                    - tooling

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 25.8.2

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-go@v6
              if: matrix.workspace == 'semantic'
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Install workspace dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ${{ matrix.workspace }} checks
              run: pnpm turbo run check --filter=${{ matrix.workspace }}

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Go - Run all tests with the race detector
              run: make test-race

    release:
        needs:
            - check
            - test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Bump version and create tag
              id: version
              uses: mathieudutour/github-tag-action@v6.2
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  default_bump: patch
                  default_prerelease_bump: false
                  tag_prefix: v

            - name: Verify release tag points at current main
              env:
                  NEW_TAG: ${{ steps.version.outputs.new_tag }}
              run: |
                  set -euo pipefail

                  git fetch --force --tags origin "refs/tags/${NEW_TAG}:refs/tags/${NEW_TAG}" main

                  tag_sha="$(git rev-list -n1 "refs/tags/${NEW_TAG}")"
                  main_sha="$(git rev-parse refs/remotes/origin/main)"

                  if [ "$tag_sha" != "$main_sha" ]; then
                      printf 'refusing to publish release artifacts: tag %s points to %s but origin/main is %s\n' "$NEW_TAG" "$tag_sha" "$main_sha" >&2
                      exit 1
                  fi
              shell: bash

            - name: Set up QEMU
              uses: docker/setup-qemu-action@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v4

            - name: Log in to GHCR
              uses: docker/login-action@v4
              with:
                  registry: ghcr.io
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@v6
              with:
                  images: ${{ env.IMAGE_NAME }}
                  tags: |
                      type=raw,value=${{ steps.version.outputs.new_tag }}

            - name: Build and push release image
              id: build
              uses: docker/build-push-action@v7
              with:
                  context: .
                  file: ./Dockerfile
                  push: true
                  platforms: linux/amd64,linux/arm64
                  tags: ${{ steps.meta.outputs.tags }}
                  labels: ${{ steps.meta.outputs.labels }}
                  build-args: |
                      VERSION=${{ steps.version.outputs.new_tag }}

            - name: Verify published release image
              env:
                  NEW_TAG: ${{ steps.version.outputs.new_tag }}
              run: ./scripts/verify-release-image.sh
              shell: bash

            - name: Promote verified release image to latest
              env:
                  DIGEST: ${{ steps.build.outputs.digest }}
              run: |
                  set -euo pipefail

                  docker buildx imagetools create \
                      --tag "${IMAGE_NAME}:latest" \
                      "${IMAGE_NAME}@${DIGEST}"
              shell: bash

            - name: Create release
              uses: softprops/action-gh-release@v2
              with:
                  tag_name: ${{ steps.version.outputs.new_tag }}
                  prerelease: false
                  generate_release_notes: true
                  body: |
                      Docker image published to `${{ env.IMAGE_NAME }}:${{ steps.version.outputs.new_tag }}`.
                      `${{ env.IMAGE_NAME }}:latest` now aliases the verified `${{ steps.version.outputs.new_tag }}` digest.
