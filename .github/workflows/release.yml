name: Release Tag

on:
    push:
        branches:
            - main

permissions:
    contents: write

concurrency:
    group: release-tag-main
    cancel-in-progress: false

jobs:
    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - semantic
                    - tooling

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 25.8.2

            - uses: pnpm/action-setup@v4
              with:
                  version: 10.33.0

            - uses: actions/setup-go@v6
              if: matrix.workspace == 'semantic'
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Install workspace dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ${{ matrix.workspace }} checks
              run: pnpm turbo run check --filter=${{ matrix.workspace }}

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-go@v6
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Go - Run all tests with the race detector
              run: make test-race

    create_tag:
        needs:
            - check
            - test
        runs-on: ubuntu-latest
        outputs:
            tag: ${{ steps.version.outputs.new_tag }}

        steps:
            - uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Create release tag
              id: version
              uses: mathieudutour/github-tag-action@v6.2
              with:
                  github_token: ${{ secrets.GITHUB_TOKEN }}
                  default_bump: patch
                  default_prerelease_bump: false
                  tag_prefix: v

    # Publishing is invoked directly so this workflow does not rely on tag-push
    # fan-out from a workflow-created tag.
    publish_release:
        needs: create_tag
        permissions:
            contents: write
            packages: write
        uses: ./.github/workflows/publish-release.yml
        secrets: inherit
        with:
            tag: ${{ needs.create_tag.outputs.tag }}
