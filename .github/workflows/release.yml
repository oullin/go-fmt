name: Release Tag

on:
    push:
        branches:
            - main

permissions:
    contents: write

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
    group: release-tag-main
    cancel-in-progress: false

jobs:
    check:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - semantic
                    - tooling

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-node@v6
              with:
                  node-version: 25.8.2

            - uses: pnpm/action-setup@v5
              with:
                  version: 10.33.0

            - uses: actions/setup-go@v6
              if: matrix.workspace == 'semantic'
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Install workspace dependencies
              run: pnpm install --frozen-lockfile

            - name: Run ${{ matrix.workspace }} checks
              run: pnpm turbo run check --filter=${{ matrix.workspace }}

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6

            - uses: actions/setup-go@v6
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Go - Run all tests with the race detector
              run: make test-race

    release_tag:
        needs:
            - check
            - test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              with:
                  fetch-depth: 0

            - name: Verify release tag token is configured
              env:
                  RELEASE_TAG_TOKEN: ${{ secrets.RELEASE_TAG_TOKEN }}
              run: |
                  if [ -z "${RELEASE_TAG_TOKEN}" ]; then
                      printf '%s\n' 'RELEASE_TAG_TOKEN is required to create release tags that trigger publish-release.yml on push.tags. Configure a fine-grained PAT with repository contents write access.' >&2
                      exit 1
                  fi

            - name: Bump version and create tag
              id: version
              uses: mathieudutour/github-tag-action@v6.2
              with:
                  github_token: ${{ secrets.RELEASE_TAG_TOKEN }}
                  default_bump: patch
                  default_prerelease_bump: false
                  tag_prefix: v
