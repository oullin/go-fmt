name: Tests

on:
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - edited

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    check:
        if: github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - semantic
                    - correctness
                    - orchestrator
                    - support

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-node@v6
              name: Install Node
              with:
                  node-version: 25.8.2

            - uses: pnpm/action-setup@v5
              name: Install pnpm
              with:
                  version: 10.33.0

            - uses: actions/setup-go@v6
              if: matrix.workspace != 'support'
              name: Install Go
              with:
                  go-version-file: packages/orchestrator/go.mod
                  cache-dependency-path: |
                      packages/semantic/go.sum
                      packages/orchestrator/go.sum

            - name: Install workspace dependencies
              run: pnpm install --frozen-lockfile

            - name: Check ${{ matrix.workspace }}
              run: ./scripts/with-storage-env.sh pnpm turbo run check --cache-dir=storage/.cache/turbo --filter=${{ matrix.workspace }}

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: packages/orchestrator/go.mod
                  cache-dependency-path: |
                      packages/semantic/go.sum
                      packages/orchestrator/go.sum

            - name: Go - Run semantic tests with race detector and coverage
              run: ./scripts/with-storage-env.sh go -C packages/semantic test ./... -race -coverprofile=coverage.out -covermode=atomic -v

            - name: Go - Run correctness tests with race detector
              run: ./scripts/with-storage-env.sh go -C packages/correctness test ./... -race -v

            - name: Go - Run orchestrator tests with race detector
              run: ./scripts/with-storage-env.sh go -C packages/orchestrator test ./... -race -v

            - uses: actions/upload-artifact@v4
              name: Upload coverage artifact
              with:
                  name: semantic-coverage
                  path: packages/semantic/coverage.out
                  if-no-files-found: error

    coverage:
        needs: test
        runs-on: ubuntu-latest

        steps:
            - uses: actions/download-artifact@v4
              name: Download coverage artifact
              with:
                  name: semantic-coverage
                  path: packages/semantic

            - uses: codecov/codecov-action@v5
              name: Upload coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: packages/semantic/coverage.out
                  fail_ci_if_error: false
