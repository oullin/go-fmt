name: Tests

on:
    pull_request:
        branches:
            - main
        types:
            - opened
            - reopened
            - synchronize
            - ready_for_review
            - edited

env:
    FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
    check:
        if: github.event.pull_request.draft == false && github.event.pull_request.base.ref == 'main'
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                workspace:
                    - semantic
                    - tooling

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-node@v6
              name: Install Node
              with:
                  node-version: 25.8.2

            - uses: pnpm/action-setup@v5
              name: Install pnpm
              with:
                  version: 10.33.0

            - uses: actions/setup-go@v6
              if: matrix.workspace == 'semantic'
              name: Install Go
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Install workspace dependencies
              run: pnpm install --frozen-lockfile

            - name: Check ${{ matrix.workspace }}
              run: pnpm turbo run check --filter=${{ matrix.workspace }}

    test:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Go - Run all tests with the race detector
              run: make test-race

    coverage:
        needs: check
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v6
              name: Checkout repository

            - uses: actions/setup-go@v6
              name: Install Go
              with:
                  go-version-file: semantic/go.mod
                  cache-dependency-path: semantic/go.sum

            - name: Go - Generate coverage report
              run: go -C semantic test ./... -coverprofile=coverage.out -covermode=atomic -v

            - uses: codecov/codecov-action@v5
              name: Upload coverage to Codecov
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: semantic/coverage.out
                  fail_ci_if_error: false
