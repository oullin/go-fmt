services:
    go-fmt:
        image: ghcr.io/oullin/go-fmt:latest
        working_dir: /work
        volumes:
            - .:/work
        environment:
            HOST_PROJECT_PATH: ${PWD}
        # --host-path is repeatable; each path must stay under HOST_PROJECT_PATH.
        command:
            - format
            - --host-path
            - ${PWD}/pkg/api
            - --host-path
            - ${PWD}/internal/app
